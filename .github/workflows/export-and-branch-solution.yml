name: Export the latest LV Solutions from Dev Environment

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-solutions:
    runs-on: windows-latest

    strategy:
      matrix:
        solution:
          - LVCommissionPortal
          - LVCommissionDataflow
          - LVCommissionWebsite
          - LVCommissionPortalAutomations
          - debtlog

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export Unmanaged Solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.DEV_URL }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          tenant-id: ${{ secrets.TENANT_ID }}
          solution-name: ${{ matrix.solution }}
          solution-output-file: ${{ matrix.solution }}.zip
          managed: false

      - name: Unpack Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: ${{ matrix.solution }}.zip
          solution-folder: solutions/${{ matrix.solution }}
          solution-type: unmanaged

      - name: Commit and Push Changes
        run: |
          git config user.name "vijay.settu"
          git config user.email "vijay.settu@loanvision.com"
          git add .
          git commit -m "Auto-export solutions from Dev" || echo "No changes to commit"
          git push
